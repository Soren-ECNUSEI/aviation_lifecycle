{% extends "base.html" %}
{% block content %}
<h2>人员入档</h2>

<!-- 新增人员表单 -->
<div class="card mb-4">
    <div class="card-header">新增操作人员</div>
    <div class="card-body">
        <form method="post">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">姓名 *</label>
                    <input type="text" class="form-control" name="name" required placeholder="例如 张三">
                </div>
                <div class="col-md-3">
                    <label class="form-label">角色 *</label>
                    <select class="form-select" name="role" required>
                        <option value="">请选择</option>
                        {% for r in roles %}
                        <option value="{{ r }}">{{ r }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">联系方式</label>
                    <input type="text" class="form-control" name="contact" placeholder="电话/邮箱">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-success">入档</button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- 人员列表 -->
<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>姓名</th>
            <th>角色</th>
            <th>联系方式</th>
        </tr>
    </thead>
    <tbody>
        {% for op in operators %}
        <tr>
            <td>{{ op.operator_id }}</td>
            <td>{{ op.name }}</td>
            <td>{{ op.role }}</td>
            <td>{{ op.contact if op.contact else '-' }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% if not operators %}
<p class="text-muted">暂无人员记录。</p>
{% endif %}
{% endblock %}
